<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <title>bou1 AR Anchor</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR Image Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Enables animated GLB models -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.1/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #startButton {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 30px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      position: fixed;
      z-index: 10;
      top: 15px;
      left: 15px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="status">Tap Start AR</div>
  <button id="startButton">Start AR</button>

  <a-scene
    id="scene"
    mindar-image="
      imageTargetSrc: targets.mind;
      autoStart: false;
      uiScanning: yes;
    "
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="30000">

      <!-- GLB model -->
      <a-asset-item id="bouModel" src="bou1.glb"></a-asset-item>

      <!-- Video file -->
      <video
        id="bouVideo"
        src="bou1.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>

    </a-assets>

    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="0 1 1" intensity="0.8"></a-light>

    <!-- Image target generated from bou1 image -->
    <a-entity id="bouTarget" mindar-image-target="targetIndex: 0">

      <!-- Anchored GLB model -->
      <a-gltf-model
        id="bouAugmentation"
        src="#bouModel"
        position="0 0 0.12"
        rotation="0 0 0"
        scale="0.25 0.25 0.25"
        animation-mixer>
      </a-gltf-model>

      <!-- Anchored video plane -->
      <a-video
        id="bouVideoPlane"
        src="#bouVideo"
        position="0 -0.65 0.03"
        rotation="0 0 0"
        width="0.9"
        height="0.5">
      </a-video>

    </a-entity>

  </a-scene>

  <script>
    const sceneEl = document.querySelector("#scene");
    const startButton = document.querySelector("#startButton");
    const statusEl = document.querySelector("#status");
    const targetEl = document.querySelector("#bouTarget");
    const videoEl = document.querySelector("#bouVideo");

    startButton.addEventListener("click", async () => {
      try {
        const mindarSystem = sceneEl.systems["mindar-image-system"];

        // Required on many mobile browsers so the video can play later
        await videoEl.play();
        videoEl.pause();
        videoEl.currentTime = 0;

        await mindarSystem.start();

        startButton.classList.add("hidden");
        statusEl.textContent = "Scanning for bou1 image...";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "AR failed to start";
      }
    });

    targetEl.addEventListener("targetFound", () => {
      statusEl.textContent = "Target found — model and video anchored";
      videoEl.play();
    });

    targetEl.addEventListener("targetLost", () => {
      statusEl.textContent = "Target lost — point camera at bou1 image";
      videoEl.pause();
    });
  </script>

</body>
</html>
